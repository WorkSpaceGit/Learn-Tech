                    explanation: "Екодизайн прагне мінімізувати шкідливий вплив виробництва на природу. Використовує дерево, лозу, перероблений папір, енергозберігаючі технології."
                },
                {
                    q: "Що означає абревіатура ЧПУ в сучасних верстатах?",
                    a: "Числове програмне управління", b: "Чавунне покриття установки", c: "Частково ручне управління", d: "Червона панель управління",
                    correct: "Числове програмне управління",
                    explanation: "Верстати з ЧПУ (CNC) керуються комп'ютерною програмою, що забезпечує неймовірну точність та швидкість обробки деталей."
                },
                {
                    q: "Яка професія належить до типу «Людина - техніка»?",
                    a: "Інженер-конструктор, токар", b: "Вчитель, лікар", c: "Бухгалтер, програміст", d: "Актор, музикант",
                    correct: "Інженер-конструктор, токар",
                    explanation: "За класифікацією Клімова, професії поділяються на типи за предметом праці. Інженери працюють з механізмами, матеріалами, енергією."
                },
                {
                    q: "Що таке апсайклінг (upcycling)?",
                    a: "Творче перетворення старих речей на нові вироби вищої якості та цінності", b: "Спалювання сміття", c: "Купівля нового одягу", d: "Очищення води",
                    correct: "Творче перетворення старих речей на нові вироби вищої якості та цінності",
                    explanation: "На відміну від простої переробки (recycling), апсайклінг надає старому предмету нову естетичну або функціональну цінність (наприклад, сумка зі старих джинсів)."
                },
                {
                    q: "Який етап проєктування є останнім?",
                    a: "Презентація (захист) та оцінювання результатів", b: "Організаційно-підготовчий", c: "Конструкторський", d: "Технологічний",
                    correct: "Презентація (захист) та оцінювання результатів",
                    explanation: "Проєкт завершується аналізом виконаної роботи, порівнянням ідеї та результату, а також публічним представленням виробу."
                }
            ]
        };

        // Стан додатку
        let currentGrade = null;
        let currentQuestions = [];
        let currentQIndex = 0;
        let score = 0;
        let isAnswered = false;

        // Ініціалізація теми
        function initTheme() {
            if (localStorage.theme === 'light') {
                document.documentElement.classList.remove('dark');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.theme = 'dark';
            }
        }

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
        }

        function toggleMobileMenu() {
            const menu = document.getElementById('mobileMenu');
            menu.classList.toggle('hidden');
        }

        function showWelcomeScreen() {
            document.getElementById('welcomeScreen').classList.remove('hidden');
            document.getElementById('quizScreen').classList.add('hidden');
            document.getElementById('resultScreen').classList.add('hidden');
        }

        // Утиліта для перемішування масиву (Алгоритм Фішера-Єтса)
        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function startTest(grade) {
            currentGrade = grade;
            score = 0;
            currentQIndex = 0;
            
            // Копіюємо і перемішуємо питання для вибраного класу
            currentQuestions = shuffleArray(db[grade]);

            document.getElementById('gradeBadge').innerText = grade + ' Клас';
            document.getElementById('welcomeScreen').classList.add('hidden');
            document.getElementById('resultScreen').classList.add('hidden');
            document.getElementById('quizScreen').classList.remove('hidden');
            
            renderQuestion();
        }

        function renderQuestion() {
            isAnswered = false;
            const q = currentQuestions[currentQIndex];
            
            document.getElementById('currentQuestionNum').innerText = currentQIndex + 1;
            document.getElementById('currentScore').innerText = score;
            document.getElementById('questionText').innerText = q.q;
            
            // Приховуємо кнопку "Далі" та зворотній зв'язок
            document.getElementById('nextBtn').classList.add('hidden');
            const feedbackContainer = document.getElementById('feedbackContainer');
            feedbackContainer.classList.add('hidden');
            feedbackContainer.className = 'mt-6 hidden p-4 rounded-xl border'; // reset classes

            // Формуємо масив варіантів та перемішуємо його
            let options = [
                { text: q.a, isCorrect: q.a === q.correct },
                { text: q.b, isCorrect: q.b === q.correct },
                { text: q.c, isCorrect: q.c === q.correct },
                { text: q.d, isCorrect: q.d === q.correct }
            ];
            options = shuffleArray(options);

            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            
            const letters = ['А', 'Б', 'В', 'Г'];

            options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'w-full text-left p-4 rounded-xl border border-gray-200 dark:border-gray-700 hover:bg-indigo-50 dark:hover:bg-indigo-900/30 font-medium option-btn flex gap-3 items-center group bg-white dark:bg-darkCard';
                
                // Візуальна структура кнопки: Літера + Текст
                btn.innerHTML = `
                    <span class="flex-shrink-0 w-8 h-8 flex items-center justify-center rounded-lg bg-gray-100 dark:bg-gray-800 text-indigo-600 dark:text-indigo-400 font-bold group-hover:bg-indigo-200 dark:group-hover:bg-indigo-800 transition">
                        ${letters[index]}
                    </span>
                    <span class="flex-grow">${opt.text}</span>
                    <i class="ph ph-check-circle text-2xl text-green-500 opacity-0 transition status-icon"></i>
                `;
                
                btn.onclick = () => handleAnswer(btn, opt.isCorrect, q.explanation, options, q.correct);
                optionsContainer.appendChild(btn);
            });
        }

        function handleAnswer(selectedBtn, isCorrect, explanation, optionsList, correctText) {
            if (isAnswered) return;
            isAnswered = true;

            const allBtns = document.getElementById('optionsContainer').children;
            
            // Відключаємо всі кнопки
            for (let btn of allBtns) {
                btn.disabled = true;
                btn.classList.remove('hover:bg-indigo-50', 'dark:hover:bg-indigo-900/30', 'cursor-pointer');
                
                // Знаходимо правильну кнопку і підсвічуємо її зеленою рамкою
                if (btn.innerText.includes(correctText)) {
                    btn.classList.add('border-green-500', 'dark:border-green-500', 'bg-green-50', 'dark:bg-green-900/20');
                    btn.querySelector('.status-icon').classList.remove('opacity-0');
                    btn.querySelector('.status-icon').className = 'ph ph-check-circle text-2xl text-green-500 transition status-icon';
                }
            }

            const feedbackContainer = document.getElementById('feedbackContainer');
            const feedbackIcon = document.getElementById('feedbackIcon');
            const feedbackTitle = document.getElementById('feedbackTitle');
            const feedbackText = document.getElementById('feedbackText');

            if (isCorrect) {
                score++;
                document.getElementById('currentScore').innerText = score;
                selectedBtn.classList.add('border-green-500'); // Додатковий акцент на вибраній
                
                // Дизайн зворотного зв'язку - успіх
                feedbackContainer.classList.remove('hidden');
                feedbackContainer.classList.add('bg-green-100', 'border-green-300', 'dark:bg-green-900/40', 'dark:border-green-800', 'fade-in');
                feedbackIcon.className = 'ph-fill ph-check-circle text-2xl mt-1 text-green-600 dark:text-green-400';
                feedbackTitle.className = 'font-bold text-lg text-green-800 dark:text-green-300';
                feedbackTitle.innerText = "Абсолютно правильно! Молодець!";
                feedbackText.innerText = explanation;
                
            } else {
                // Підсвічуємо помилкову червоним
                selectedBtn.classList.add('border-red-500', 'dark:border-red-500', 'bg-red-50', 'dark:bg-red-900/20');
                selectedBtn.querySelector('.status-icon').classList.remove('opacity-0');
                selectedBtn.querySelector('.status-icon').className = 'ph ph-x-circle text-2xl text-red-500 transition status-icon';

                // Дизайн зворотного зв'язку - помилка
                feedbackContainer.classList.remove('hidden');
                feedbackContainer.classList.add('bg-red-100', 'border-red-300', 'dark:bg-red-900/40', 'dark:border-red-800', 'fade-in');
                feedbackIcon.className = 'ph-fill ph-warning-circle text-2xl mt-1 text-red-600 dark:text-red-400';
                feedbackTitle.className = 'font-bold text-lg text-red-800 dark:text-red-300';
                feedbackTitle.innerText = "На жаль, це помилка.";
                feedbackText.innerText = explanation;
            }

            // Показуємо кнопку "Далі"
            document.getElementById('nextBtn').classList.remove('hidden');
        }

        function nextQuestion() {
            currentQIndex++;
            if (currentQIndex < currentQuestions.length) {
                renderQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('quizScreen').classList.add('hidden');
            const resultScreen = document.getElementById('resultScreen');
            resultScreen.classList.remove('hidden');
            
            document.getElementById('finalScore').innerText = score;
            
            const messageEl = document.getElementById('resultMessage');
            const iconEl = document.getElementById('resultIcon');
            
            // Логіка оцінювання
            if (score === 12) {
                messageEl.innerText = "Блискучий результат! Ти справжній майстер технологій!";
                iconEl.innerHTML = '<i class="ph-fill ph-trophy text-7xl text-yellow-500"></i>';
            } else if (score >= 9) {
                messageEl.innerText = "Чудова робота! Ти дуже добре засвоїв матеріал.";
                iconEl.innerHTML = '<i class="ph-fill ph-medal text-7xl text-indigo-500"></i>';
            } else if (score >= 6) {
                messageEl.innerText = "Непогано, але є куди рости. Повтори пройдений матеріал.";
                iconEl.innerHTML = '<i class="ph-fill ph-thumbs-up text-7xl text-green-500"></i>';
            } else {
                messageEl.innerText = "Тобі варто більше уваги приділити цьому предмету. Спробуй ще раз!";
                iconEl.innerHTML = '<i class="ph-fill ph-books text-7xl text-red-500"></i>';
            }
        }

        // Запуск
        initTheme();
    </script>
</body>
</html>
